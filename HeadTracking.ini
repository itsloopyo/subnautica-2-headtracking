; Subnautica 2 Head Tracking - configuration

[Network]
Port = 4242
BindAddress = 0.0.0.0

[Tracking]
EnableOnStartup = true
YawSensitivity = 1.0
PitchSensitivity = 1.0
RollSensitivity = 1.0
InvertYaw = false
InvertPitch = false
InvertRoll = false
Smoothing = 0.0
AimDecoupling = true
ShowReticle = true
; Yaw mode: true = horizon-locked yaw (default), false = camera-local
WorldSpaceYaw = true

[Tooltip]
; Drag the interaction prompt ("hover an interactable") to the body-forward
; reticle so it sits where you are aiming, not at the head-tracked view centre.
FollowReticle = true
; Backbuffer pixels -> UMG slate units for the prompt's render transform. 1.0
; matches the reticle 1:1 on SN2 (one slate unit per backbuffer pixel for the
; world-hint widget). Adjust only if the prompt over- or undershoots the
; reticle at your resolution; lower = slower, higher = faster.
FollowScale = 1.0

[Position]
Enabled = true
SensitivityX = 1.0
SensitivityY = 1.0
SensitivityZ = 1.0
InvertX = true
InvertY = false
InvertZ = true
LimitX = 0.30
LimitY = 0.20
; Z limits swapped because InvertZ=true: with inversion, forward = +z (the
; limit_z_back bound) and backward = -z (the limit_z bound). Keeping forward
; generous (0.40) and backward restricted (0.10) means LimitZBack holds the
; generous value here.
LimitZ = 0.10
LimitZBack = 0.40
Smoothing = 0.15

[Hotkeys]
; Recenter (Home), toggle tracking (End), and cycle tracking mode (Page Up)
; are fixed, each also reachable with a Ctrl+Shift chord. Only the yaw-mode
; toggle is rebindable here. VK code: PageDown = 0x22.
ToggleYawMode = 0x22
